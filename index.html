// ── 투자금 변화 미니 그래프 (시간 vs 총투자금)
function PortfolioChart({ snapshots, currentValue }) {
  if(!snapshots || snapshots.length < 1) return null;
  const allPoints = [...snapshots, { time: Date.now(), value: currentValue }];
  if(allPoints.length < 2) return null;

  const W = 340, H = 90;
  const vals = allPoints.map(p => p.value);
  const minV = Math.min(...vals) * 0.998;
  const maxV = Math.max(...vals) * 1.002;
  const range = maxV - minV || 1;

  const pts = allPoints.map((p, i) => {
    const x = (i / (allPoints.length - 1)) * (W - 20) + 10;
    const y = H - 10 - ((p.value - minV) / range) * (H - 20);
    return `${x},${y}`;
  }).join(' ');

  const first = allPoints[0].value;
  const last = currentValue;
  const gain = first > 0 ? ((last - first) / first) * 100 : 0;
  const color = gain >= 0 ? T.green : T.red;

  // path for area fill
  const ptsArr = allPoints.map((p, i) => ({
    x: (i / (allPoints.length - 1)) * (W - 20) + 10,
    y: H - 10 - ((p.value - minV) / range) * (H - 20)
  }));
  const linePath = ptsArr.map((p, i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const areaPath = `${linePath} L${ptsArr[ptsArr.length-1].x},${H-10} L${ptsArr[0].x},${H-10} Z`;

  return h("div", { style:{marginBottom:14} },
    h("div", { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8} },
      h("div", { style:{fontSize:12,fontWeight:700,color:T.text} }, "📈 총평가액 변화"),
      h("div", { style:{fontSize:12,fontWeight:700,color} }, `${gain>=0?"+":""}${gain.toFixed(2)}%`)
    ),
    h("div", { style:{background:T.bg,borderRadius:12,padding:"10px 8px",border:`1px solid ${T.border}`,overflow:"hidden"} },
      h("svg", { viewBox:`0 0 ${W} ${H}`, style:{width:"100%",height:H} },
        h("defs", null,
          h("linearGradient", { id:"chartGrad", x1:"0", y1:"0", x2:"0", y2:"1" },
            h("stop", { offset:"0%", stopColor:color, stopOpacity:"0.3" }),
            h("stop", { offset:"100%", stopColor:color, stopOpacity:"0.02" })
          )
        ),
        h("path", { d:areaPath, fill:"url(#chartGrad)" }),
        h("polyline", { points:pts, fill:"none", stroke:color, strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round" }),
        ptsArr.length > 0 && h("circle", { cx:ptsArr[ptsArr.length-1].x, cy:ptsArr[ptsArr.length-1].y, r:3.5, fill:color })
      ),
      h("div", { style:{display:"flex",justifyContent:"space-between",marginTop:4} },
        h("span", { style:{fontSize:10,color:T.text3} }, new Date(allPoints[0].time).toLocaleDateString("ko-KR",{month:"short",day:"numeric"})),
        h("span", { style:{fontSize:10,color:T.text3} }, "현재")
      )
    )
  );
}

// ── 포맷
function won(v){
  if(v==null||isNaN(v))return"—";
  const a=Math.abs(v);
  if(a>=1e8)return`${(v/1e8).toFixed(2)}억원`;
  if(a>=1e6)return`${(v/1e6).toFixed(1)}백만원`;
  return`${Math.round(v).toLocaleString("ko-KR")}원`;
}
function usd(v){
  if(v==null||isNaN(v))return"—";
  const a=Math.abs(v),s=v<0?"-":"";
  return a>=1000?`${s}$${a.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`:`${s}$${a.toFixed(2)}`;
}
function fmtTime(d){if(!d)return"";return d.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
function sc(s){return(s||0)>=70?T.green:(s||0)>=50?T.yellow:T.red;}

// ── iOS Safari 호환 유틸리티
function makeAbortSignal(ms) {
  if(typeof AbortSignal !== 'undefined' && AbortSignal.timeout) return AbortSignal.timeout(ms);
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), ms);
  return ctrl.signal;
}

//   해외주식/환율: whateverorigin.org + stooq.com CSV (CORS OK, 실제 동작 확인)
//   국내주식:      whateverorigin.org + investing.com 스크래핑 → 실패 시 fallback
//   환율:          open.er-api.com (무료, CORS OK, 실제 동작 확인)

const _priceCache = {};
const CACHE_TTL = 5 * 60 * 1000;

// stooq 심볼 변환
function toStooqSym(ticker) {
  if(ticker === 'USDKRW=X' || ticker === 'USDKRW') return 'usdkrw';
  if(ticker.endsWith('.KS')) return ticker.replace('.KS', '.kr').toLowerCase();
  if(ticker.endsWith('.KQ')) return ticker.replace('.KQ', '.kr').toLowerCase();
  return ticker.toLowerCase() + '.us';
}

// whateverorigin + stooq: CSV에서 종가 파싱
// 응답 예: Symbol,Date,Time,Open,High,Low,Close,Volume\nPLTR.US,2026-03-06,...,157.16,...
async function fetchStooqPrice(ticker) {
  const sym = toStooqSym(ticker);
  const stooqUrl = `https://stooq.com/q/l/?s=${sym}&f=sd2t2ohlcv&h&e=csv`;
  const proxyUrl = `https://whateverorigin.org/get?url=${encodeURIComponent(stooqUrl)}`;
  try {
    const res = await fetch(proxyUrl, { signal: makeAbortSignal(12000) });
    if(!res.ok) return null;
    const j = await res.json();
    const csv = j?.contents || '';
    const lines = csv.trim().split('\n');
    if(lines.length < 2) return null;
    const cols = lines[1].split(',');
    const close = parseFloat(cols[6]);
    if(!isFinite(close) || close <= 0) return null;
    return close;
  } catch { return null; }
}

// 환율: open.er-api.com (실제 CORS OK 확인)
async function fetchExchangeRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD', { signal: makeAbortSignal(8000) });
    if(!res.ok) return null;
    const j = await res.json();
    const rate = j?.rates?.KRW;
    return (rate && isFinite(rate)) ? Math.round(rate) : null;
  } catch { return null; }
}

// 국내주식: stooq .kr 심볼 시도 → 실패 시 null (fallback 사용)
// stooq에서 한국 주식은 N/D가 많으므로 Yahoo Finance via whateverorigin도 시도
async function fetchKoreanStock(ticker) {
  // 1차: stooq .kr
  const stooqPrice = await fetchStooqPrice(ticker);
  if(stooqPrice) return stooqPrice;

  // 2차: corsproxy.io + Yahoo Finance v8 (한국주식 전용 fallback)
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`)}`,
    `https://whateverorigin.org/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`)}`,
  ];
  for(const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: makeAbortSignal(10000) });
      if(!res.ok) continue;
      const raw = await res.text();
      // allorigins/corsproxy → 직접 JSON, whateverorigin → {contents:...}
      let jsonStr = raw;
      if(raw.includes('"contents"')) {
        const j = JSON.parse(raw);
        jsonStr = j?.contents || '';
      }
      if(!jsonStr || jsonStr.startsWith('<') || jsonStr.startsWith('Edge:')) continue;
      const parsed = JSON.parse(jsonStr);
      const meta = parsed?.chart?.result?.[0]?.meta;
      const price = meta?.regularMarketPrice ?? meta?.chartPreviousClose;
      if(price && price > 0) return price;
    } catch {}
  }
  return null;
}

async function fetchPrice(ticker) {
  const now = Date.now();
  if(_priceCache[ticker] && now - _priceCache[ticker].ts < CACHE_TTL) {
    return _priceCache[ticker].price;
  }
  let price = null;
  const isKorean = ticker.endsWith('.KS') || ticker.endsWith('.KQ');
  const isRate = ticker === 'USDKRW=X';

  if(isRate) {
    price = await fetchExchangeRate();
  } else if(isKorean) {
    price = await fetchKoreanStock(ticker);
  } else {
    // 해외주식: stooq 1차 → 실패 시 corsproxy + Yahoo 2차
    price = await fetchStooqPrice(ticker);
    if(price == null) {
      price = await fetchForeignFallback(ticker);
    }
  }

  if(price != null) _priceCache[ticker] = { price, ts: now };
  return price;
}

async function fetchForeignFallback(ticker) {
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`)}`,
  ];
  for(const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: makeAbortSignal(10000) });
      if(!res.ok) continue;
      const raw = await res.text();
      if(!raw || raw.startsWith('<')) continue;
      const parsed = JSON.parse(raw);
      const meta = parsed?.chart?.result?.[0]?.meta;
      const p = meta?.regularMarketPrice ?? meta?.chartPreviousClose;
      if(p && p > 0) return p;
    } catch {}
  }
  return null;
}

async function refreshAllPrices(onProgress, portfolio) {
  // portfolio가 전달되면 그것을 사용, 아니면 전역 DOMESTIC/FOREIGN 사용
  const dom = portfolio ? portfolio.domestic : DOMESTIC;
  const for_ = portfolio ? portfolio.foreign : FOREIGN;

  const krw  = {};
  const usdP = {};
  const liveSet = new Set(); // ✅ 실제로 가격 수신 성공한 ticker 추적
  // 초기값은 각 항목 avg 기반 fallback
  dom.forEach(d => krw[d.name] = d.avg);
  for_.forEach(f => usdP[f.name] = f.avg);
  let rate = FALLBACK_RATE;

  const totalCount = 1 + dom.length + for_.length;
  let done = 0;
  const tick = () => { done++; if(onProgress) onProgress(done, totalCount); };

  // 환율 먼저 (빠름)
  const rateResult = await fetchExchangeRate();
  if(rateResult) rate = rateResult;
  tick();

  // 해외 + 국내 병렬 처리 (4개씩 배치)
  const items = [
    ...dom.map(d => ({ key: d.name, ticker: d.ticker, type: 'krw' })),
    ...for_.map(f => ({ key: f.name, ticker: f.name, type: 'usd' })),
  ];

  const CONCURRENCY = 4;
  for(let i = 0; i < items.length; i += CONCURRENCY) {
    const batch = items.slice(i, i + CONCURRENCY);
    await Promise.allSettled(batch.map(async t => {
      const price = await fetchPrice(t.ticker);
      if(price != null) {
        if(t.type === 'krw') krw[t.key] = price;
        else usdP[t.key] = price;
        liveSet.add(t.key); // ✅ 실제 수신 성공 기록
      }
      tick();
    }));
    if(i + CONCURRENCY < items.length) await new Promise(r => setTimeout(r, 200));
  }

  return { krw, usd: usdP, rate, liveSet }; // ✅ liveSet 반환
}

// ── ✅ 강력한 JSON 파서 (AI 응답의 불완전한 JSON 처리)
function safeParseJSON(raw){
  if(!raw||typeof raw!=="string") throw new Error("빈 응답");

  // 1단계: markdown fence 제거
  let s = raw.replace(/^```(?:json)?\s*/i,"").replace(/\s*```\s*$/,"").trim();

  // 2단계: JSON 블록 경계 추출
  const st = s.indexOf("{"), en = s.lastIndexOf("}");
  if(st===-1||en===-1) throw new Error("응답에서 JSON을 찾을 수 없습니다");
  s = s.slice(st, en+1);

  // 3단계: 1차 시도 — 그대로 파싱
  try { return JSON.parse(s); } catch(_) {}

  // 4단계: JSON 문자열 내부의 깨진 부분 수술적 수정
  // 핵심 문제: AI가 문자열 값 안에 이스케이프 없이 줄바꿈·따옴표를 넣는 경우
  let fixed = "";
  let inString = false;
  let escaped = false;
  for(let i=0; i<s.length; i++){
    const c = s[i];
    if(escaped){ fixed += c; escaped=false; continue; }
    if(c==="\\") { fixed += c; escaped=true; continue; }
    if(c==='"') { inString = !inString; fixed += c; continue; }
    if(inString){
      // 문자열 내부에서 허용되지 않는 제어문자 → 공백으로
      if(c==="\n"||c==="\r"){ fixed += " "; continue; }
      if(c==="\t"){ fixed += " "; continue; }
      const code = c.charCodeAt(0);
      if(code < 0x20){ fixed += " "; continue; }
    }
    fixed += c;
  }
  // 5단계: trailing comma 제거
  fixed = fixed.replace(/,(\s*[}\]])/g, "$1");

  // 6단계: 2차 파싱 시도
  try { return JSON.parse(fixed); } catch(e2) {
    // 7단계: 마지막 수단 — 값이 잘렸거나 배열이 미완성인 경우 닫아주기
    try {
      let patched = fixed;
      // 열린 배열/객체 카운트
      let depth = 0;
      let inStr = false, esc = false;
      const opens = [];
      for(let i=0; i<patched.length; i++){
        const c2 = patched[i];
        if(esc){ esc=false; continue; }
        if(c2==="\\"){ esc=true; continue; }
        if(c2==='"'){ inStr=!inStr; continue; }
        if(!inStr){
          if(c2==="{"||c2==="["){ opens.push(c2); depth++; }
          else if(c2==="}"||c2==="]"){ opens.pop(); depth--; }
        }
      }
      // 닫히지 않은 괄호 닫아주기
      if(inStr) patched += '"';
      for(let i=opens.length-1; i>=0; i--){
        patched += opens[i]==="{"? "}" : "]";
      }
      patched = patched.replace(/,(\s*[}\]])/g, "$1");
      return JSON.parse(patched);
    } catch(e3) {
      throw new Error(`JSON 파싱 실패: ${e2.message}`);
    }
  }
}

// ── API 호출 공통 헬퍼
async function _apiPost(key, body) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": key,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if(!res.ok){
    const msg = data?.error?.message || `HTTP ${res.status}`;
    if(res.status===401) throw new Error("API 키가 유효하지 않습니다. 키를 다시 확인해주세요.");
    if(res.status===429) throw new Error("API 요청 한도 초과. 잠시 후 다시 시도해주세요.");
    if(res.status===529||res.status===503) throw new Error("Anthropic 서버가 과부하 상태입니다. 잠시 후 다시 시도해주세요.");
    throw new Error(msg);
  }
  return data;
}

// ── 웹 검색 포함 Claude 호출 (2026 최신 데이터 기반)
// 흐름: 1차 호출(web_search 툴 제공) → AI가 검색 실행 → 검색결과 포함 2차 호출 → 최종 JSON
async function callClaudeWithSearch(system, userMessage, maxTokens=2500, onStatus=null) {
  const key = window.__PORTFOLIO_API_KEY__;
  if(!key) throw new Error("API 키가 없습니다");

  const WEB_SEARCH_TOOL = {
    type: "web_search_20250305",
    name: "web_search",
    max_uses: 5
  };

  // ── 올바른 multi-turn 루프:
  // web_search_20250305 는 server-side tool 이므로 Anthropic이 직접 실행함
  // 클라이언트는 stop_reason === "end_turn" 이 될 때까지 루프를 돌며
  // 매 턴마다 assistant의 content 블록(tool_use + tool_result 포함)을 그대로 messages에 추가해야 함
  //
  // 루프 흐름:
  //   1) POST → stop_reason="tool_use" → assistant content에 tool_use + tool_result 포함됨
  //   2) messages에 assistant content 추가 → 다시 POST
  //   3) stop_reason="end_turn" → assistant content에 최종 text 블록 있음 → 완료

  let messages = [{ role:"user", content: userMessage }];
  let searchCount = 0;
  const MAX_TURNS = 8;  // 최대 루프 횟수 (무한루프 방지)

  if(onStatus) onStatus("🔍 최신 시장 데이터 검색 중...");

  for(let turn = 0; turn < MAX_TURNS; turn++) {
    const data = await _apiPost(key, {
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      system,
      tools: [WEB_SEARCH_TOOL],
      messages
    });

    // assistant 응답을 messages 히스토리에 추가
    messages.push({ role:"assistant", content: data.content });

    // 검색 중인 쿼리 수 파악 → 상태 메시지 업데이트
    const toolUseBlocks = (data.content||[]).filter(b => b.type === "tool_use");
    if(toolUseBlocks.length > 0) {
      searchCount += toolUseBlocks.length;
      if(onStatus) onStatus(`🔍 웹 검색 중... (${searchCount}건 완료)`);
    }

    // tool_result 블록 확인 (검색 결과가 content에 포함된 경우)
    const toolResultBlocks = (data.content||[]).filter(b => b.type === "tool_result");
    if(toolResultBlocks.length > 0 && onStatus) {
      onStatus(`🧠 검색 결과 분석 중... (${searchCount}건 데이터 반영)`);
    }

    // end_turn 이면 최종 텍스트 추출
    if(data.stop_reason === "end_turn") {
      if(onStatus) onStatus("✍️ 최신 데이터 기반 분석 작성 중...");
      const textBlocks = (data.content||[]).filter(b => b.type === "text");
      const text = textBlocks.map(b => b.text).join("");
      if(!text) {
        // text가 없는 경우 이전 메시지에서 찾기
        const allText = messages
          .filter(m => m.role === "assistant")
          .flatMap(m => Array.isArray(m.content) ? m.content : [m.content])
          .filter(b => b && b.type === "text")
          .map(b => b.text)
          .join("");
        if(!allText) throw new Error("AI 응답이 비어 있습니다");
        return safeParseJSON(allText);
      }
      return safeParseJSON(text);
    }

    // tool_use 상태인데 tool_result가 content에 없는 경우 → 클라이언트가 tool_result 제출 필요
    // (이 경우는 web_search_20250305에서는 발생하지 않아야 하지만 안전 처리)
    if(data.stop_reason === "tool_use") {
      const hasToolResults = (data.content||[]).some(b => b.type === "tool_result");
      if(!hasToolResults) {
        // tool_result가 없다면 빈 result라도 제출 (fallback)
        const toolUses = (data.content||[]).filter(b => b.type === "tool_use");
        const userToolResults = toolUses.map(tu => ({
          type: "tool_result",
          tool_use_id: tu.id,
          content: "검색 결과를 가져올 수 없습니다. 기존 지식으로 분석하세요."
        }));
        messages.push({ role:"user", content: userToolResults });
      }
      // tool_result가 이미 있는 경우엔 다음 루프에서 자동으로 계속됨
      continue;
    }

    // 그 외 stop_reason (max_tokens 등) → 텍스트 추출 시도
    const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    if(text) return safeParseJSON(text);
    throw new Error(`예상치 못한 stop_reason: ${data.stop_reason}`);
  }

  throw new Error("검색 루프 최대 횟수 초과");
}

// 하위 호환 (기존 코드에서 callClaude 호출 시 검색 없는 버전으로 폴백)
async function callClaude(system, userMessage, maxTokens=1400){
  return callClaudeWithSearch(system, userMessage, maxTokens, null);
}

function Spinner({text,sub}){

function ErrBox({msg,onRetry}){
  return h("div",{style:{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,padding:16,color:T.red,textAlign:"center",marginBottom:12}},
    h("div",{style:{fontSize:18,marginBottom:6}},"⚠️"),
    h("div",{style:{fontSize:12,marginBottom:10,wordBreak:"break-all",lineHeight:1.5}},msg),
    onRetry&&h("button",{onClick:onRetry,style:{background:T.red,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",fontSize:12}},"다시 시도")
  );
}
function PieChart({data}){
  const total=data.reduce((s,d)=>s+d.v,0);if(!total)return null;
  // 섹터가 1개면 원으로 표시 (arc path의 start=end 버그 방지)
  if(data.length===1){
    return h("svg",{viewBox:"0 0 160 160",style:{width:"100%",maxWidth:150}},
      h("circle",{cx:80,cy:80,r:70,fill:data[0].color}));
  }
  let cum=-Math.PI/2;
  return h("svg",{viewBox:"0 0 160 160",style:{width:"100%",maxWidth:150}},
    ...data.map((d,i)=>{
      const a=(d.v/total)*2*Math.PI;
      // 아주 작은 슬라이스(0.1% 미만)는 건너뜀 (NaN 방지)
      if(a < 0.001){ cum+=a; return null; }
      const x1=80+70*Math.cos(cum),y1=80+70*Math.sin(cum);
      cum+=a;
      const x2=80+70*Math.cos(cum),y2=80+70*Math.sin(cum);
      return h("path",{key:i,d:`M80,80 L${x1},${y1} A70,70 0 ${a>Math.PI?1:0},1 ${x2},${y2} Z`,fill:d.color,stroke:"#fff",strokeWidth:"1.5"});
    }).filter(Boolean)
  );
}
function Gauge({score,label,color}){
  const val=isFinite(score)?Math.max(0,Math.min(100,score)):0,r=28,c=2*Math.PI*r;
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
    h("svg",{width:70,height:70,viewBox:"0 0 72 72"},
      h("circle",{cx:36,cy:36,r,fill:"none",stroke:T.card2,strokeWidth:7}),
      h("circle",{cx:36,cy:36,r,fill:"none",stroke:color,strokeWidth:7,strokeDasharray:`${(val/100)*c} ${c}`,strokeLinecap:"round",transform:"rotate(-90 36 36)"}),
      h("text",{x:36,y:40,textAnchor:"middle",fill:T.text,fontSize:14,fontWeight:"bold"},val)
    ),
    h("div",{style:{fontSize:10,color:T.text2,textAlign:"center",lineHeight:1.3,whiteSpace:"pre-line"}},label)
  );
}

// ── 메인 앱
function App(){
  const[tab,setTab]=useState("overview");
  const[apiKey,setApiKey]=useState(null);
  const[showModal,setShowModal]=useState(false);

  // ── 포트폴리오 state (수정 가능)
  const[domestic,setDomestic]=useState(DEFAULT_DOMESTIC);
  const[foreign,setForeign]=useState(DEFAULT_FOREIGN);
  const[editItem,setEditItem]=useState(null);
  const[showAddModal,setShowAddModal]=useState(false);
  const[snapshots,setSnapshots]=useState([]);

  const[prices,setPrices]=useState(()=>{
    const krw={},usd={};
    DEFAULT_DOMESTIC.forEach(d=>krw[d.name]=d.avg);
    DEFAULT_FOREIGN.forEach(f=>usd[f.name]=f.avg);
    return{krw,usd,rate:FALLBACK_RATE};
  });
  const[refreshing,setRefreshing]=useState(false);
  const[refreshProgress,setRefreshProgress]=useState(null);
  const[priceStatus,setPriceStatus]=useState("fallback");
  const[lastUpdate,setLastUpdate]=useState(null);
  const[elapsed,setElapsed]=useState(0);
  const[expanded,setExpanded]=useState(null);
  const[aiData,setAiData]=useState(null);
  const[aiLoading,setAiLoading]=useState(false);
  const[aiErr,setAiErr]=useState(null);
  const[aiStatus,setAiStatus]=useState(null);
  const[selGuru,setSelGuru]=useState(null);
  const[guruCache,setGuruCache]=useState({});
  const[guruLoading,setGuruLoading]=useState(false);
  const[guruErr,setGuruErr]=useState(null);
  const[guruStatus,setGuruStatus]=useState(null);

  useEffect(()=>{DOMESTIC=domestic;},[domestic]);
  useEffect(()=>{FOREIGN=foreign;},[foreign]);

  const doRefresh=useCallback(async()=>{
    if(refreshing) return;
    setRefreshing(true);
    setElapsed(0);
    setRefreshProgress({done:0,total:domestic.length+foreign.length+1});
    setPriceStatus("fallback");
    // BUG-8 fix: 강제 갱신 시 캐시 초기화
    Object.keys(_priceCache).forEach(k=>delete _priceCache[k]);
    const t0=Date.now();
    const timer=setInterval(()=>setElapsed(((Date.now()-t0)/1000).toFixed(1)),200);
    try{
      const p=await refreshAllPrices((done,total)=>setRefreshProgress({done,total}),{domestic,foreign});
      setPrices(p);
      const liveKRW=domestic.filter(d=>p.liveSet&&p.liveSet.has(d.name)).length;
      const liveUSD=foreign.filter(f=>p.liveSet&&p.liveSet.has(f.name)).length;
      const tot=domestic.length+foreign.length;
      const liveCount=liveKRW+liveUSD;
      setPriceStatus(liveCount===0?"fallback":liveCount<tot?"partial":"live");
    }
    catch(e){console.error(e);setPriceStatus("fallback");}
    finally{
      clearInterval(timer);
      setElapsed(((Date.now()-t0)/1000).toFixed(1));
      setLastUpdate(new Date());
      setRefreshing(false);
      setRefreshProgress(null);
    }
  },[refreshing,domestic,foreign]);

  useEffect(()=>{doRefresh();},[]);
  // BUG-3 fix: prices.liveSet 변경 시 priceStatus 재계산 (종목 삭제 후 반영)
  useEffect(()=>{
    if(!prices.liveSet) return;
    const liveKRW=domestic.filter(d=>prices.liveSet.has(d.name)).length;
    const liveUSD=foreign.filter(f=>prices.liveSet.has(f.name)).length;
    const tot=domestic.length+foreign.length;
    if(tot===0){setPriceStatus("fallback");return;}
    const liveCount=liveKRW+liveUSD;
    setPriceStatus(liveCount===0?"fallback":liveCount<tot?"partial":"live");
  },[prices.liveSet,domestic.length,foreign.length]);

  // 계산
  const dItems=domestic.map(d=>{
    const cur=prices.krw[d.name]??d.avg,cost=d.avg*d.shares,curr=cur*d.shares;
    return{...d,cur,cost,curr,pl:curr-cost,plp:((cur-d.avg)/d.avg)*100,type:"KRW"};
  });
  const fItems=foreign.map(f=>{
    const cur=prices.usd[f.name]??f.avg,costUSD=f.avg*f.shares,currUSD=cur*f.shares;
    const cost=costUSD*prices.rate,curr=currUSD*prices.rate;
    return{...f,cur,cost,curr,pl:curr-cost,plp:((cur-f.avg)/f.avg)*100,costUSD,currUSD,plUSD:currUSD-costUSD,type:"USD"};
  });
  const all=[...dItems,...fItems];
  const tCostKRW=dItems.reduce((s,i)=>s+i.cost,0),tCurrKRW=dItems.reduce((s,i)=>s+i.curr,0);
  const tCostUSD=fItems.reduce((s,i)=>s+i.costUSD,0),tCurrUSD=fItems.reduce((s,i)=>s+i.currUSD,0);
  const tCost=tCostKRW+tCostUSD*prices.rate,tCurr=tCurrKRW+tCurrUSD*prices.rate;
  const tPL=tCurr-tCost,tPLp=tCost>0?(tPL/tCost)*100:0;
  const tPLKRW=tCurrKRW-tCostKRW,tPLUSD=tCurrUSD-tCostUSD;
  const secMap={};
  all.forEach(i=>{secMap[i.sector]=(secMap[i.sector]||0)+i.curr;});
  const secData=Object.entries(secMap).map(([k,v])=>({k,v,color:SECTOR_COLORS[k]||"#94a3b8"})).sort((a,b)=>b.v-a.v);

  // 스냅샷 (가격 갱신될 때마다 기록)
  useEffect(()=>{
    if(priceStatus!=='fallback'&&tCurr>0){
      setSnapshots(prev=>{
        const last=prev[prev.length-1];
        if(last&&Math.abs(last.value-tCurr)<1) return prev;
        return [...prev,{time:Date.now(),value:tCurr}].slice(-50);
      });
    }
  },[tCurr,priceStatus]);

  // ── 포트폴리오 수정
  function handleSaveEdit(updated){
    if(updated.type==='KRW'){
      setDomestic(prev=>prev.map(d=>d.name===updated.name?{...d,shares:updated.shares,avg:updated.avg}:d));
      // 실시간 가격이 이미 있으면 유지, 없을 때만 avg로 초기화 (BUG-2 fix: avg로 덮어쓰지 않음)
      setPrices(prev=>{
        const curPrice = prev.krw[updated.name];
        const hasLive = curPrice && Math.abs(curPrice - updated.avg) > 1;
        return hasLive ? prev : {...prev,krw:{...prev.krw,[updated.name]:updated.avg}};
      });
    } else {
      setForeign(prev=>prev.map(f=>f.name===updated.name?{...f,shares:updated.shares,avg:updated.avg}:f));
      setPrices(prev=>{
        const curPrice = prev.usd[updated.name];
        const hasLive = curPrice && Math.abs(curPrice - updated.avg) > 0.001;
        return hasLive ? prev : {...prev,usd:{...prev.usd,[updated.name]:updated.avg}};
      });
    }
    setEditItem(null);
    setAiData(null);
    setGuruCache({});
    setTimeout(()=>doRefresh(), 100); // BUG-1 fix: 수정 후 실시간 가격 재조회
  }
  function handleDelete(item){
    if(item.type==='KRW'){
      setDomestic(prev=>prev.filter(d=>d.name!==item.name));
      setPrices(prev=>{const k={...prev.krw};delete k[item.name];const ls=new Set(prev.liveSet||[]);ls.delete(item.name);return{...prev,krw:k,liveSet:ls};});
    } else {
      setForeign(prev=>prev.filter(f=>f.name!==item.name));
      setPrices(prev=>{const u={...prev.usd};delete u[item.name];const ls=new Set(prev.liveSet||[]);ls.delete(item.name);return{...prev,usd:u,liveSet:ls};});
    }
    setEditItem(null);
    setAiData(null);
    setGuruCache({});
  }

      setPrices(prev=>({...prev,krw:{...prev.krw,[entry.name]:entry.avg}}));

    setAiData(null);
    setGuruCache({}); // BUG-6 fix: 신규 종목 추가 시 거물전략 캐시 초기화

    if(!apiKey){setShowModal(true);return;}
    cb();

    h("div",{style:{background:T.bg,minHeight:"100vh",color:T.text,maxWidth:430,margin:"0 auto"}},

      // ── 헤더
      h("div",{style:{background:`linear-gradient(135deg,#0d9488,#14b8a6)`,padding:"20px 16px 14px",
        position:"sticky",
        top:0,zIndex:10,boxShadow:"0 2px 12px rgba(13,148,136,0.25)",WebkitOverflowScrolling:"touch"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
          h("div",null,
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.7)",letterSpacing:2,marginBottom:4}},"MY PORTFOLIO"),
            h("div",{style:{fontSize:20,fontWeight:800,color:"#fff",lineHeight:1.2}},
              `${won(tCurrKRW)} `,h("span",{style:{opacity:0.6}},"+"),` ${usd(tCurrUSD)}`),
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:2}},`≈ 총 ${won(tCurr)}`)
          ),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            h("button",{onClick:()=>setShowModal(true),
              style:{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,

              apiKey?"🔓":"🔑"),

              guruCache[g.id]&&h("div",{style:{marginTop:6,fontSize:10,color:g.color,background:`${g.color}18`,borderRadius:6,padding:"2px 6px",display:"inline-block"}},"분석완료 ✓")))
          ),
          !selGuru&&h("div",{style:{textAlign:"center",padding:"30px 0",color:T.text3}},h("div",{style:{fontSize:30,marginBottom:8}},"👆"),h("div",{style:{fontSize:13}},"투자자를 선택하면 AI가 전략을 분석합니다")),
          selGuru&&guruLoading&&h("div",{style:{textAlign:"center",padding:"40px 16px"}},
            h("div",{style:{fontSize:34,marginBottom:12,display:"inline-block",WebkitAnimation:"spin 1.2s linear infinite",animation:"spin 1.2s linear infinite"}},"⚙️"),
            h("div",{style:{fontSize:14,fontWeight:700,color:T.text2,marginTop:4}},`${selGuru.name} 전략 분석 중...`),
            h("div",{style:{fontSize:12,color:T.primary,marginTop:8,fontWeight:600,minHeight:20}},guruStatus||"준비 중..."),
            h("div",{style:{fontSize:11,color:T.text3,marginTop:6}},"13F 공시·최신 인터뷰 검색 중"),
            h("div",{style:{display:"flex",gap:6,justifyContent:"center",marginTop:14}},
              ["🔍 검색","🧠 분석","✍️ 작성"].map((step,i)=>{
                const active = guruStatus&&guruStatus.startsWith(step.slice(0,2));
                const done = guruStatus&&(
                  (step==="🔍 검색"&&(guruStatus.includes("분석")||guruStatus.includes("작성")))||
                  (step==="🧠 분석"&&guruStatus.includes("작성"))
                );
                return h("div",{key:i,style:{
                  fontSize:11,padding:"4px 10px",borderRadius:99,fontWeight:600,
                  background:done?"#d1fae5":active?`${T.primary}22`:T.bg,
                  color:done?T.green:active?T.primary:T.text3,
                  border:`1px solid ${done?T.green:active?T.primary:T.border}`
                }},done?"✓ "+step:step)
              })
            )
          ),
          selGuru&&guruErr&&h(ErrBox,{msg:guruErr,onRetry:retryGuru}),
          selGuru&&guruCache[selGuru.id]&&!guruLoading&&!guruErr&&(()=>{
            const d=guruCache[selGuru.id],g=selGuru;
            return h(React.Fragment,null,
              // 거물 프로필 카드
              h("div",{style:{background:T.card,borderRadius:16,padding:16,marginBottom:12,border:`2px solid ${g.color}44`,boxShadow:`0 2px 12px ${g.color}18`}},
                h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:10}},
                  h("div",{style:{fontSize:34}},g.emoji),
                  h("div",null,
                    h("div",{style:{fontSize:16,fontWeight:800,color:T.text}},g.name),
                    h("div",{style:{fontSize:12,color:T.text3}},g.org),
                    d.searchedDate&&h("div",{style:{fontSize:10,color:T.green,marginTop:2,fontWeight:600}},`🌐 ${d.searchedDate} 기준`)
                  )),
                d.philosophyQuote&&h("div",{style:{fontSize:12,color:g.color,fontStyle:"italic",fontWeight:600,marginBottom:10,padding:"8px 10px",background:`${g.color}10`,borderRadius:8,borderLeft:`3px solid ${g.color}`}},
                  `"${d.philosophyQuote}"`),
                h("div",{style:{fontSize:12,color:T.text2,lineHeight:1.7,marginBottom:10}},d.strategy),
                h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
                  (d.keyThemes||[]).map((t,i)=>h("span",{key:i,style:{fontSize:11,background:`${g.color}18`,color:g.color,padding:"3px 10px",borderRadius:99,fontWeight:600}},t)))),
              h(Card,null,h(STitle,null,"🔭 2025-2026 시장 전망"),h("div",{style:{fontSize:12,color:T.text2,lineHeight:1.7}},d.outlook)),
              h(Card,null,
                h(STitle,null,"💼 주요 보유 종목"),
                (d.topHoldings||[]).map((hh,i,arr)=>h("div",{key:i,style:{padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
                    h("div",{style:{display:"flex",gap:8,alignItems:"center"}},h("span",{style:{fontSize:13,fontWeight:800,color:g.color}},hh.ticker),h("span",{style:{fontSize:12,color:T.text2}},hh.name)),
                    h("span",{style:{fontSize:12,fontWeight:700,color:T.yellow}},hh.weight)),
                  h("div",{style:{fontSize:11,color:T.text2,lineHeight:1.5,marginBottom:6}},hh.thesis),
                  h("div",{style:{height:3,background:T.border,borderRadius:99,overflow:"hidden"}},h("div",{style:{height:"100%",width:hh.weight,maxWidth:"100%",background:g.color}}))))),
              h(Card,null,
                h(STitle,null,"📰 최근 포지션 변화"),
                (d.recentMoves||[]).map((m,i,arr)=>h("div",{key:i,style:{display:"flex",gap:10,padding:"10px 0",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none",alignItems:"flex-start"}},
                  h(Badge,{text:m.type,color:m.type==="매수"?T.green:T.red}),
                  h("div",null,h("span",{style:{fontSize:13,fontWeight:700,color:T.text,marginRight:6}},m.ticker),h("span",{style:{fontSize:12,color:T.text2}},m.desc))))),
              // 내 포트폴리오와의 연관성
              d.portfolioFit&&h(Card,null,
                h(STitle,null,"🔗 내 포트폴리오와의 연관성"),
                h("div",{style:{fontSize:12,color:T.text2,lineHeight:1.7}},d.portfolioFit)),
              h("div",{style:{background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:12,fontSize:11,color:T.text3,lineHeight:1.6}},"⚠️ ",d.riskWarning),
              h("button",{onClick:()=>{setGuruCache(p=>{const n={...p};delete n[g.id];return n;});fetchGuruData(g);},
                style:{width:"100%",background:T.card,color:T.primary,border:`1px solid ${T.primary}`,borderRadius:12,padding:10,fontSize:12,fontWeight:600,marginTop:10,cursor:"pointer"}},"🔄 재분석")
            );
          })()
        )
      )
    ),
    // ── 편집 모달
    editItem&&h(EditStockModal,{
      item:editItem,
      onSave:handleSaveEdit,
      onDelete:handleDelete,
      onClose:()=>setEditItem(null)
    }),
    // ── 추가 모달
    showAddModal&&h(AddStockModal,{
      onSave:handleAddStock,
      onClose:()=>setShowAddModal(false),
      existingNames
    })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
